<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔺 Tam giác · Chứng minh trực quan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f7fc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 1600px;
      background: white;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid #dce2ea;
      padding: 28px 32px 32px 32px;
    }

    .header {
      margin-bottom: 28px;
      border-bottom: 2px solid #eef2f6;
      padding-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 600;
      color: #0b1a2f;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 span {
      background: #f0f4fe;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 22px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-actions button {
      background: white;
      border: 1px solid #d0d8e2;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: #1f2a3a;
      cursor: pointer;
      transition: all 0.15s;
      background: #fafcff;
    }

    .header-actions button:hover {
      background: #edf2f9;
      border-color: #a5b6cc;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-bottom: 28px;
    }

    @media (max-width: 980px) {
      .main-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    .canvas-wrapper {
      background: #ffffff;
      border: 1px solid #dce2ea;
      padding: 16px 16px 12px 16px;
    }

    .canvas-wrapper h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1e2b3c;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 600 / 400;
      background: #fbfdff;
      border: 1px solid #d0d8e2;
      cursor: grab;
      transition: border 0.1s ease;
    }

    canvas:active {
      cursor: grabbing;
      border-color: #7b8ba3;
    }

    .canvas-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .canvas-actions button {
      background: white;
      border: 1px solid #d0d8e2;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: #1f2a3a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      background: #fafcff;
    }

    .canvas-actions button:hover {
      background: #edf2f9;
      border-color: #a5b6cc;
    }

    .tip {
      font-size: 12px;
      color: #6c7e91;
      background: #f6f9fd;
      padding: 8px 12px;
      margin-top: 12px;
      border-left: 4px solid #8a9cb0;
      border: 1px solid #e2e9f2;
    }

    .info-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #dce2ea;
      padding: 16px 18px 18px 18px;
    }

    .card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #1f2b3c;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #edf2f7;
      padding-bottom: 8px;
    }

    .classification-badge {
      font-size: 18px;
      font-weight: 600;
      color: #1d3a6f;
      background: #f0f6fe;
      display: inline-block;
      padding: 4px 14px 4px 12px;
      border: 1px solid #d3def0;
      letter-spacing: 0.01em;
    }

    .measurement-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .measurement-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #edf2f7;
      font-size: 14px;
    }

    .measurement-item:last-child {
      border-bottom: none;
    }

    .measurement-label {
      color: #445566;
    }

    .measurement-value {
      font-weight: 600;
      color: #0b1f33;
    }

    .angle-total {
      margin-top: 6px;
      padding-top: 8px;
      border-top: 2px solid #d5dee9;
    }

    .angle-total .measurement-value {
      color: #1d4a7a;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 28px;
      margin-top: 8px;
    }

    @media (max-width: 1024px) {
      .footer-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 680px) {
      .footer-grid {
        grid-template-columns: 1fr;
      }
    }

    .hypothesis-card, .conclusion-card, .editor-card {
      background: #fbfdff;
      border: 1px solid #dce2ea;
      padding: 16px 18px 18px 18px;
    }

    .hypothesis-card h3, .conclusion-card h3, .editor-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #1f2b3c;
      margin-bottom: 12px;
      border-bottom: 1px solid #edf2f7;
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hypothesis-card ul, .conclusion-card ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hypothesis-card li, .conclusion-card li {
      font-size: 13.5px;
      color: #1f2f42;
      padding-left: 22px;
      position: relative;
      line-height: 1.5;
    }

    .hypothesis-card li::before {
      content: "▸";
      position: absolute;
      left: 2px;
      color: #3865a0;
      font-weight: 600;
    }

    .conclusion-card li::before {
      content: "✓";
      position: absolute;
      left: 0px;
      color: #1e7b4c;
      font-weight: 600;
    }

    .editor-card input, .editor-card select {
      padding: 6px 8px;
      border: 1px solid #d0d8e2;
      font-size: 13px;
      background: white;
      margin-right: 8px;
    }

    .editor-card input { width: 80px; }
    .editor-card select { width: 100px; }

    .editor-card .row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .editor-card .row label {
      min-width: 30px;
      font-weight: 500;
      color: #1f2b3c;
    }

    .editor-card button {
      background: white;
      border: 1px solid #d0d8e2;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
    }

    .editor-card button:hover {
      background: #edf2f9;
      border-color: #a5b6cc;
    }

    .editor-card .editor-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .export-section {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .export-section button {
      background: #1f3d6b;
      border: none;
      color: white;
      padding: 8px 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .export-section button:hover {
      background: #143157;
    }

    .export-section button.secondary {
      background: #2d4a72;
    }

    .problem-selector {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .problem-selector button {
      background: #eef2f6;
      border: 1px solid #d0d8e2;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .problem-selector button:hover {
      background: #dce4ed;
    }

    .problem-selector button.active {
      background: #1f3d6b;
      color: white;
      border-color: #1f3d6b;
    }

    .format-options {
      display: flex;
      gap: 16px;
      margin-top: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .format-options label {
      font-size: 13px;
      color: #1f2b3c;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .format-options input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .format-options select {
      padding: 4px 8px;
      border: 1px solid #d0d8e2;
      font-size: 13px;
      background: white;
    }

    @media (max-width: 600px) {
      .container {
        padding: 16px 14px;
      }
      .header h1 {
        font-size: 22px;
      }
      .card {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span>△</span> Chứng minh tam giác</h1>
    <div class="header-actions">
      <button onclick="resetTriangle()">↻ Đặt lại</button>
      <button onclick="randomTriangle()">🎲 Ngẫu nhiên</button>
    </div>
  </div>

  <div class="main-grid">
    <div class="canvas-wrapper" id="canvasWrapper">
      <h2>📐 Vẽ tam giác</h2>
      <canvas id="triangleCanvas" width="600" height="400"></canvas>
      <div class="tip">💡 Kéo các điểm đỉnh · số liệu tự động</div>
    </div>

    <div class="info-panel">
      <div class="card">
        <h3>📊 Phân loại</h3>
        <div class="classification-badge" id="classification">Tam giác thường</div>
        <div style="margin-top: 8px; font-size: 13px; color: #2c405a;" id="subClassification"></div>
      </div>

      <div class="card">
        <h3>📏 Độ dài cạnh</h3>
        <div class="measurement-list" id="sidesList"></div>
      </div>

      <div class="card">
        <h3>∠ Góc</h3>
        <div class="measurement-list" id="anglesList"></div>
      </div>

      <div class="card">
        <h3>📐 Định lý & công thức</h3>
        <div id="formulaDisplay" style="font-size: 13px; color: #1f2f42; line-height: 1.7;"></div>
      </div>
    </div>
  </div>

  <div class="footer-grid">
    <div class="hypothesis-card">
      <h3>📋 Giả thuyết</h3>
      <ul id="hypothesisList"></ul>
    </div>
    <div class="conclusion-card">
      <h3>✓ Kết luận</h3>
      <ul id="conclusionList"></ul>
    </div>
    <div class="editor-card">
      <h3>✏️ Editor · Nhập số đo</h3>
      <div class="row"><label>A:</label><input type="number" id="inputA" step="0.1" value="0"> °</div>
      <div class="row"><label>B:</label><input type="number" id="inputB" step="0.1" value="0"> °</div>
      <div class="row"><label>C:</label><input type="number" id="inputC" step="0.1" value="0"> °</div>
      <div class="row"><label>AB:</label><input type="number" id="inputAB" step="0.1" value="0"></div>
      <div class="row"><label>BC:</label><input type="number" id="inputBC" step="0.1" value="0"></div>
      <div class="row"><label>AC:</label><input type="number" id="inputAC" step="0.1" value="0"></div>
      <div class="row">
        <label>Đơn vị:</label>
        <select id="unitSelect">
          <option value="nm">Nanomet (nm)</option>
          <option value="micromet">Micromet (µm)</option>
          <option value="mm">Milimet (mm)</option>
          <option value="cm">Centimet (cm)</option>
          <option value="dm">Decimet (dm)</option>
          <option value="m" selected>Mét (m)</option>
          <option value="km">Kilomet (km)</option>
          <option value="saoBac">Sào Bắc Bộ</option>
          <option value="saoNam">Sào Nam Bộ</option>
        </select>
      </div>
      <div class="editor-actions">
        <button onclick="applyEditor()">Áp dụng</button>
        <button onclick="clearEditor()">Xóa</button>
      </div>
    </div>
  </div>

  <div class="footer-grid" style="margin-top: 16px;">
    <div class="card" style="grid-column: 1 / -1;">
      <h3>🧾 Bài toán & Xuất</h3>
      <div class="problem-selector">
        <button class="active" data-problem="general" onclick="setProblem('general')">📐 Tổng quát</button>
        <button data-problem="area" onclick="setProblem('area')">📐 Diện tích</button>
        <button data-problem="pythagoras" onclick="setProblem('pythagoras')">📐 Pythagore</button>
        <button data-problem="sin" onclick="setProblem('sin')">📐 Định lý sin</button>
        <button data-problem="cos" onclick="setProblem('cos')">📐 Định lý cos</button>
      </div>
      <div class="format-options">
        <label>
          <input type="checkbox" id="roundDecimals" checked>
          Làm tròn số thập phân (2 chữ số)
        </label>
        <label>
          Số chữ số thập phân:
          <select id="decimalPlaces">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </label>
        <label>
          <input type="checkbox" id="roundAngles" checked>
          Làm tròn góc (số nguyên)
        </label>
      </div>
      <div class="export-section">
        <button onclick="exportPDF()">📄 Xuất PDF</button>
        <button onclick="exportMarkdown()" class="secondary">📝 Xuất Markdown</button>
        <button onclick="exportExam()" class="secondary">📋 Đề thi mẫu</button>
        <button onclick="printCanvas()" class="secondary">🖨️ In hình tam giác</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('triangleCanvas');
    const ctx = canvas.getContext('2d');

    let points = [
      { x: 150, y: 100, id: 'A' },
      { x: 450, y: 100, id: 'B' },
      { x: 300, y: 300, id: 'C' }
    ];
    let dragging = null;
    let currentUnit = 'm';
    let currentProblem = 'general';

    const unitFactors = {
      'nm': 1e-9, 'micromet': 1e-6, 'mm': 0.001, 'cm': 0.01, 'dm': 0.1,
      'm': 1, 'km': 1000, 'saoBac': 360, 'saoNam': 1296
    };

    function getUnitLabel(unit) {
      const labels = {
        'nm': 'nm', 'micromet': 'µm', 'mm': 'mm', 'cm': 'cm', 'dm': 'dm',
        'm': 'm', 'km': 'km', 'saoBac': 'sào BB', 'saoNam': 'sào NB'
      };
      return labels[unit] || unit;
    }

    function convertLength(value, fromUnit, toUnit) {
      const meters = value * unitFactors[fromUnit];
      return meters / unitFactors[toUnit];
    }

    function getDisplayUnit() {
      return document.getElementById('unitSelect').value;
    }

    function getDecimalPlaces() {
      if (document.getElementById('roundDecimals').checked) {
        return parseInt(document.getElementById('decimalPlaces').value);
      }
      return null;
    }

    function formatNumber(value, unit = '') {
      const places = getDecimalPlaces();
      if (places !== null) {
        return value.toFixed(places) + (unit ? ' ' + unit : '');
      }
      return value.toString() + (unit ? ' ' + unit : '');
    }

    function formatAngle(value, unit = '°') {
      if (document.getElementById('roundAngles').checked) {
        return Math.round(value) + unit;
      }
      const places = getDecimalPlaces();
      if (places !== null) {
        return value.toFixed(places) + unit;
      }
      return value.toString() + unit;
    }

    function dist(p1, p2) { return Math.hypot(p2.x - p1.x, p2.y - p1.y); }

    function angleDeg(p1, p2, p3) {
      const a = dist(p2, p3), b = dist(p1, p3), c = dist(p1, p2);
      const cosC = (a*a + b*b - c*c) / (2*a*b);
      const clamped = Math.max(-1, Math.min(1, cosC));
      return (Math.acos(clamped) * 180) / Math.PI;
    }

    function getSides() {
      return [
        { name: 'AB', length: dist(points[0], points[1]) },
        { name: 'BC', length: dist(points[1], points[2]) },
        { name: 'AC', length: dist(points[0], points[2]) }
      ];
    }

    function getAngles() {
      return [
        { vertex: 'A', value: angleDeg(points[0], points[1], points[2]) },
        { vertex: 'B', value: angleDeg(points[1], points[0], points[2]) },
        { vertex: 'C', value: angleDeg(points[2], points[0], points[1]) }
      ];
    }

    function classifyDetailed() {
      const sides = getSides();
      const sorted = [...sides].sort((a,b) => a.length - b.length);
      const a = sorted[0].length, b = sorted[1].length, c = sorted[2].length;
      const angles = getAngles();
      const A = angles[0].value, B = angles[1].value, C = angles[2].value;
      
      let main = '', sub = '';
      const eq = Math.abs(a - b) < 0.1 && Math.abs(b - c) < 0.1;
      const iso = Math.abs(a - b) < 1 || Math.abs(b - c) < 1 || Math.abs(a - c) < 1;
      const right = Math.abs(A - 90) < 1 || Math.abs(B - 90) < 1 || Math.abs(C - 90) < 1;
      const obtuse = A > 90 || B > 90 || C > 90;
      const acute = !right && !obtuse;

      if (eq) { main = 'Tam giác đều'; sub = 'Cạnh bằng nhau, góc 60°'; }
      else if (right && iso) { main = 'Tam giác vuông cân'; sub = 'Góc 90°, hai cạnh góc vuông bằng nhau'; }
      else if (right) { main = 'Tam giác vuông'; sub = 'Có một góc 90°'; }
      else if (iso) { main = 'Tam giác cân'; sub = 'Hai cạnh bên bằng nhau'; }
      else if (obtuse) { main = 'Tam giác tù'; sub = 'Có một góc lớn hơn 90°'; }
      else if (acute) { main = 'Tam giác nhọn'; sub = 'Cả ba góc đều nhỏ hơn 90°'; }
      else { main = 'Tam giác thường'; sub = 'Không có tính chất đặc biệt'; }
      return { main, sub };
    }

    function computeFormulas() {
      const sides = getSides();
      const angles = getAngles();
      const a = sides[0].length, b = sides[1].length, c = sides[2].length;
      const A = angles[0].value * Math.PI/180, B = angles[1].value * Math.PI/180, C = angles[2].value * Math.PI/180;
      const area = 0.5 * a * b * Math.sin(C) || 0;
      const p = a + b + c;
      const s = p / 2;
      const heron = Math.sqrt(s * (s-a) * (s-b) * (s-c)) || 0;
      const sinA = Math.sin(A), sinB = Math.sin(B), sinC = Math.sin(C);
      return { area, chuvi: p, heron, sinA, sinB, sinC, s, a, b, c, A: A*180/Math.PI, B: B*180/Math.PI, C: C*180/Math.PI };
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#e9edf4';
      ctx.lineWidth = 0.6;
      for (let i = 0; i < canvas.width; i += 50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
      for (let i = 0; i < canvas.height; i += 50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

      const sides = getSides();
      const unit = getDisplayUnit();
      const unitLabel = getUnitLabel(unit);
      
      ctx.strokeStyle = '#1f3d6b';
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      ctx.lineTo(points[1].x, points[1].y);
      ctx.lineTo(points[2].x, points[2].y);
      ctx.closePath();
      ctx.stroke();

      ctx.fillStyle = '#1a2d47';
      ctx.font = '500 13px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      
      const sideLabels = sides.map(s => {
        const val = convertLength(s.length, 'm', unit);
        return formatNumber(val, unitLabel);
      });

      const midAB = { x: (points[0].x+points[1].x)/2, y: (points[0].y+points[1].y)/2 - 14 };
      ctx.fillText(sideLabels[0], midAB.x, midAB.y);
      
      const midBC = { x: (points[1].x+points[2].x)/2 + 18, y: (points[1].y+points[2].y)/2 + 4 };
      ctx.textBaseline = 'middle';
      ctx.fillText(sideLabels[1], midBC.x, midBC.y);
      
      const midAC = { x: (points[0].x+points[2].x)/2 - 18, y: (points[0].y+points[2].y)/2 + 4 };
      ctx.fillText(sideLabels[2], midAC.x, midAC.y);

      // Draw angle arcs
      const angles = getAngles();
      const angleLabels = angles.map(a => formatAngle(a.value));
      const radius = 30;
      
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const startA = Math.atan2(points[1].y - points[0].y, points[1].x - points[0].x);
      const endA = Math.atan2(points[2].y - points[0].y, points[2].x - points[0].x);
      ctx.arc(points[0].x, points[0].y, radius, startA, endA);
      ctx.stroke();
      
      ctx.strokeStyle = '#2980b9';
      ctx.beginPath();
      const startB = Math.atan2(points[0].y - points[1].y, points[0].x - points[1].x);
      const endB = Math.atan2(points[2].y - points[1].y, points[2].x - points[1].x);
      ctx.arc(points[1].x, points[1].y, radius, startB, endB);
      ctx.stroke();
      
      ctx.strokeStyle = '#27ae60';
      ctx.beginPath();
      const startC = Math.atan2(points[1].y - points[2].y, points[1].x - points[2].x);
      const endC = Math.atan2(points[0].y - points[2].y, points[0].x - points[2].x);
      ctx.arc(points[2].x, points[2].y, radius, startC, endC);
      ctx.stroke();

      // Draw vertices and angle labels
      points.forEach((p, i) => {
        ctx.fillStyle = '#1f3d6b';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 7, 0, 2 * Math.PI);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#0b1d32';
        ctx.font = 'bold 14px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(p.id, p.x, p.y - 12);
        
        ctx.fillStyle = ['#c0392b', '#2980b9', '#27ae60'][i];
        ctx.font = '12px Inter, sans-serif';
        ctx.textBaseline = 'bottom';
        const anglePos = {
          0: { x: p.x + 45 * Math.cos((startA + endA)/2), y: p.y + 45 * Math.sin((startA + endA)/2) },
          1: { x: p.x + 45 * Math.cos((startB + endB)/2), y: p.y + 45 * Math.sin((startB + endB)/2) },
          2: { x: p.x + 45 * Math.cos((startC + endC)/2), y: p.y + 45 * Math.sin((startC + endC)/2) }
        };
        ctx.fillText(angleLabels[i], anglePos[i].x, anglePos[i].y);
      });
    }

      const angles = getAngles();
      const cls = classifyDetailed();
      const unit = getDisplayUnit();
      const unitLabel = getUnitLabel(unit);

      document.getElementById('hypothesisList').innerHTML = `
        <li>Cho tam giác ABC</li>

        <li>∠B = ${formatAngle(angles[1].value)}</li>
        <li>∠C = ${formatAngle(angles[2].value)}</li>
      `;

      let problemSpecific = '';
      if (currentProblem === 'area') {
        problemSpecific = `<li>Diện tích: ${formatNumber(convertLength(f.heron * f.heron, 'm2', unit), unitLabel + '²')}</li>`;
      } else if (currentProblem === 'pythagoras') {
        const right = Math.abs(f.A - 90) < 1 || Math.abs(f.B - 90) < 1 || Math.abs(f.C - 90) < 1;
        problemSpecific = `<li>${right ? '✔ Tam giác vuông, thỏa mãn định lý Pythagore' : '✘ Không phải tam giác vuông'}</li>`;
      } else if (currentProblem === 'sin') {
        problemSpecific = `<li>a/sinA = ${formatNumber(f.a/f.sinA)}, b/sinB = ${formatNumber(f.b/f.sinB)}, c/sinC = ${formatNumber(f.c/f.sinC)}</li>`;
      } else if (currentProblem === 'cos') {
        problemSpecific = `<li>a² = ${formatNumber(f.a*f.a)}, b²+c²−2bc·cosA = ${formatNumber(f.b*f.b + f.c*f.c - 2*f.b*f.c*Math.cos(f.A*Math.PI/180))}</li>`;
      }

      document.getElementById('conclusionList').innerHTML = `
        <li>Loại: ${cls.main} (${cls.sub})</li>
        <li>Chu vi: ${formatNumber(convertLength(f.chuvi, 'm', unit), unitLabel)}</li>
        <li>Diện tích: ${formatNumber(convertLength(f.heron * f.heron, 'm2', unit), unitLabel + '²')}</li>
        ${problemSpecific}
        <li>Định lý sin: a/sinA = b/sinB = c/sinC ≈ ${formatNumber(f.a/f.sinA)}</li>
        <li>Định lý cos: a² = b² + c² − 2bc·cosA</li>
        <li>Pythagore (nếu vuông): ${(Math.abs(f.A-90)<1||Math.abs(f.B-90)<1||Math.abs(f.C-90)<1) ? '✔ Thỏa mãn' : '—'}</li>
      `;
    }

    window.applyEditor = function() {
      const A = parseFloat(document.getElementById('inputA').value);
      const B = parseFloat(document.getElementById('inputB').value);
      const C = parseFloat(document.getElementById('inputC').value);
      const AB = parseFloat(document.getElementById('inputAB').value);
      const BC = parseFloat(document.getElementById('inputBC').value);
      const AC = parseFloat(document.getElementById('inputAC').value);
      
      if (!isNaN(A) && !isNaN(B) && !isNaN(C) && A+B+C > 179 && A+B+C < 181) {
        const scale = 200;
        const ang = [A, B, C].map(d => d * Math.PI / 180);
        const xA = 200, yA = 300;
        const xB = xA + scale, yB = yA;
        const xC = xA + scale * Math.cos(ang[0]) + 0, yC = yA - scale * Math.sin(ang[0]);
        points = [
          { x: xA, y: yA, id: 'A' },
          { x: xB, y: yB, id: 'B' },
          { x: xC, y: yC, id: 'C' }
        ];
        renderAll();
      } else if (!isNaN(AB) && !isNaN(BC) && !isNaN(AC) && AB+BC>AC && AB+AC>BC && BC+AC>AB) {
        const xA = 150, yA = 250;
        const xB = xA + AB * 1.2, yB = yA;
        const d = (AB*AB + AC*AC - BC*BC) / (2*AB);
        const h = Math.sqrt(AC*AC - d*d);
        const xC = xA + d * 1.2, yC = yA - h * 1.2;
        points = [
          { x: xA, y: yA, id: 'A' },
          { x: xB, y: yB, id: 'B' },
          { x: xC, y: yC, id: 'C' }
        ];
        renderAll();
      } else {
        alert('Vui lòng nhập góc hợp lệ (tổng 180°) hoặc 3 cạnh hợp lệ.');
      }
    };

          <script>
            const c = document.getElementById('printCanvas');

            const points = ${JSON.stringify(points)};
            
            function dist(p1, p2) { return Math.hypot(p2.x - p1.x, p2.y - p1.y); }
            function angleDeg(p1, p2, p3) {
              const a = dist(p2, p3), b = dist(p1, p3), c = dist(p1, p2);
              const cosC = (a*a + b*b - c*c) / (2*a*b);
              const clamped = Math.max(-1, Math.min(1, cosC));
              return (Math.acos(clamped) * 180) / Math.PI;
            }
            
            function formatAngle(v) {

            }
            
            function formatNum(v) {

                { name: 'BC', length: dist(points[1], points[2]) },
                { name: 'AC', length: dist(points[0], points[2]) }
              ];
              const angles = [

                { vertex: 'B', value: angleDeg(points[1], points[0], points[2]) },
                { vertex: 'C', value: angleDeg(points[2], points[0], points[1]) }
              ];
              
              ctx.strokeStyle = '#1f3d6b';
              ctx.lineWidth = 2.4;
              ctx.beginPath();
              ctx.moveTo(points[0].x, points[0].y);
              ctx.lineTo(points[1].x, points[1].y);
              ctx.lineTo(points[2].x, points[2].y);
              ctx.closePath();
              ctx.stroke();
              
              const unit = '${data.unit}';
              const unitLabel = '${data.unitLabel}';
              const unitFactor = ${unitFactor};
              
              ctx.fillStyle = '#1a2d47';
              ctx.font = '500 13px Inter, sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'bottom';
              
              const labels = sides.map(s => {
                const val = s.length * unitFactor;
                return formatNum(val) + ' ' + unitLabel;

              const midAB = { x: (points[0].x+points[1].x)/2, y: (points[0].y+points[1].y)/2 - 14 };
              ctx.fillText(labels[0], midAB.x, midAB.y);
              const midBC = { x: (points[1].x+points[2].x)/2 + 18, y: (points[1].y+points[2].y)/2 + 4 };
              ctx.textBaseline = 'middle';
              ctx.fillText(labels[1], midBC.x, midBC.y);
              const midAC = { x: (points[0].x+points[2].x)/2 - 18, y: (points[0].y+points[2].y)/2 + 4 };
              ctx.fillText(labels[2], midAC.x, midAC.y);
              
              // Draw angle arcs
              const radius = 30;
              
              ctx.strokeStyle = '#c0392b';
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              const startA = Math.atan2(points[1].y - points[0].y, points[1].x - points[0].x);
              const endA = Math.atan2(points[2].y - points[0].y, points[2].x - points[0].x);
              ctx.arc(points[0].x, points[0].y, radius, startA, endA);
              ctx.stroke();
              
              ctx.strokeStyle = '#2980b9';
              ctx.beginPath();
              const startB = Math.atan2(points[0].y - points[1].y, points[0].x - points[1].x);
              const endB = Math.atan2(points[2].y - points[1].y, points[2].x - points[1].x);
              ctx.arc(points[1].x, points[1].y, radius, startB, endB);
              ctx.stroke();
              
              ctx.strokeStyle = '#27ae60';
              ctx.beginPath();
              const startC = Math.atan2(points[1].y - points[2].y, points[1].x - points[2].x);
              const endC = Math.atan2(points[0].y - points[2].y, points[0].x - points[2].x);
              ctx.arc(points[2].x, points[2].y, radius, startC, endC);
              ctx.stroke();
              
              // Angle labels
              const angleLabels = angles.map(a => formatAngle(a.value));
              
              points.forEach((p, i) => {
                ctx.fillStyle = '#1f3d6b';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 7, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#0b1d32';

                ctx.textBaseline = 'bottom';
                ctx.fillText(p.id, p.x, p.y - 12);
                
                ctx.fillStyle = ['#c0392b', '#2980b9', '#27ae60'][i];
                ctx.font = '12px Inter, sans-serif';

                };
                ctx.fillText(angleLabels[i], anglePos[i].x, anglePos[i].y);
              });
            }
            drawPrint();
            
            window.onload = function() {
              setTimeout(() => {
                window.print();
              }, 500);
            };
          <\/script>
        </body>
        </html>

      const printWindow = window.open('', '_blank', 'width=800,height=600');
      printWindow.document.write(`
        <html><head><title>Hình tam giác</title>
        <style>
          body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: white; flex-direction: column; }
          canvas { max-width: 100%; height: auto; border: 1px solid #ddd; }
          .info { font-family: Arial, sans-serif; margin-top: 20px; font-size: 14px; }
          .info div { margin: 4px 0; }
          .info .label { font-weight: 600; }
          .angle-A { color: #c0392b; }
          .angle-B { color: #2980b9; }
          .angle-C { color: #27ae60; }
          button { position: fixed; top: 20px; right: 20px; padding: 10px 20px; cursor: pointer; }
        </style>
        </head><body>
        <canvas id="printCanvas" width="600" height="400"></canvas>
        <div class="info" id="infoDisplay"></div>
        <button onclick="window.print()">🖨️ In</button>
        <script>
          const c = document.getElementById('printCanvas');
          const ctx = c.getContext('2d');
          const points = ${JSON.stringify(points)};
          const unit = '${getDisplayUnit()}';
          const unitLabel = '${getUnitLabel(getDisplayUnit())}';
          
          function dist(p1, p2) { return Math.hypot(p2.x - p1.x, p2.y - p1.y); }
          function angleDeg(p1, p2, p3) {
            const a = dist(p2, p3), b = dist(p1, p3), c = dist(p1, p2);
            const cosC = (a*a + b*b - c*c) / (2*a*b);
            const clamped = Math.max(-1, Math.min(1, cosC));
            return (Math.acos(clamped) * 180) / Math.PI;
          }
          
          function formatNum(v) {
            const places = ${getDecimalPlaces() !== null ? getDecimalPlaces() : 2};
            return v.toFixed(places);
          }
          
          function formatAngle(v) {
            return Math.round(v) + '°';
          }
          
          function drawPrint() {
            ctx.clearRect(0, 0, c.width, c.height);
            ctx.strokeStyle = '#e9edf4';
            ctx.lineWidth = 0.6;
            for (let i = 0; i < c.width; i += 50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,c.height); ctx.stroke(); }
            for (let i = 0; i < c.height; i += 50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(c.width,i); ctx.stroke(); }
            
            const sides = [
              { name: 'AB', length: dist(points[0], points[1]) },
              { name: 'BC', length: dist(points[1], points[2]) },
              { name: 'AC', length: dist(points[0], points[2]) }
            ];
            const angles = [
              { vertex: 'A', value: angleDeg(points[0], points[1], points[2]) },
              { vertex: 'B', value: angleDeg(points[1], points[0], points[2]) },
              { vertex: 'C', value: angleDeg(points[2], points[0], points[1]) }
            ];
            
            ctx.strokeStyle = '#1f3d6b';
            ctx.lineWidth = 2.4;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.lineTo(points[2].x, points[2].y);
            ctx.closePath();
            ctx.stroke();
            
            // Side labels
            ctx.fillStyle = '#1a2d47';
            ctx.font = '500 13px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            const midAB = { x: (points[0].x+points[1].x)/2, y: (points[0].y+points[1].y)/2 - 14 };
            ctx.fillText(formatNum(sides[0].length) + ' ' + unitLabel, midAB.x, midAB.y);
            const midBC = { x: (points[1].x+points[2].x)/2 + 18, y: (points[1].y+points[2].y)/2 + 4 };
            ctx.textBaseline = 'middle';
            ctx.fillText(formatNum(sides[1].length) + ' ' + unitLabel, midBC.x, midBC.y);
            const midAC = { x: (points[0].x+points[2].x)/2 - 18, y: (points[0].y+points[2].y)/2 + 4 };
            ctx.fillText(formatNum(sides[2].length) + ' ' + unitLabel, midAC.x, midAC.y);
            
            // Angle arcs
            const radius = 30;
            
            ctx.strokeStyle = '#c0392b';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            const startA = Math.atan2(points[1].y - points[0].y, points[1].x - points[0].x);
            const endA = Math.atan2(points[2].y - points[0].y, points[2].x - points[0].x);
            ctx.arc(points[0].x, points[0].y, radius, startA, endA);
            ctx.stroke();
            
            ctx.strokeStyle = '#2980b9';
            ctx.beginPath();
            const startB = Math.atan2(points[0].y - points[1].y, points[0].x - points[1].x);
            const endB = Math.atan2(points[2].y - points[1].y, points[2].x - points[1].x);
            ctx.arc(points[1].x, points[1].y, radius, startB, endB);
            ctx.stroke();
            
            ctx.strokeStyle = '#27ae60';
            ctx.beginPath();
            const startC = Math.atan2(points[1].y - points[2].y, points[1].x - points[2].x);
            const endC = Math.atan2(points[0].y - points[2].y, points[0].x - points[2].x);
            ctx.arc(points[2].x, points[2].y, radius, startC, endC);
            ctx.stroke();
            
            // Vertices with angle labels
            points.forEach((p, i) => {
              ctx.fillStyle = '#1f3d6b';
              ctx.beginPath();
              ctx.arc(p.x, p.y, 7, 0, 2 * Math.PI);
              ctx.fill();
              ctx.strokeStyle = 'white';
              ctx.lineWidth = 2;
              ctx.stroke();
              ctx.fillStyle = '#0b1d32';
              ctx.font = 'bold 14px Inter, sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'bottom';
              ctx.fillText(p.id, p.x, p.y - 12);
              
              ctx.fillStyle = ['#c0392b', '#2980b9', '#27ae60'][i];
              ctx.font = '12px Inter, sans-serif';
              ctx.textBaseline = 'bottom';
              const anglePos = {
                0: { x: p.x + 45 * Math.cos((startA + endA)/2), y: p.y + 45 * Math.sin((startA + endA)/2) },
                1: { x: p.x + 45 * Math.cos((startB + endB)/2), y: p.y + 45 * Math.sin((startB + endB)/2) },
                2: { x: p.x + 45 * Math.cos((startC + endC)/2), y: p.y + 45 * Math.sin((startC + endC)/2) }
              };
              ctx.fillText(formatAngle(angles[i].value), anglePos[i].x, anglePos[i].y);
            });
            
            // Info display with 3 angles clearly shown
            const info = document.getElementById('infoDisplay');
            const total = angles.reduce((s,a) => s + a.value, 0);
            info.innerHTML = \`
              <div><span class="label">Cạnh:</span> AB = \${formatNum(sides[0].length)} \${unitLabel}, BC = \${formatNum(sides[1].length)} \${unitLabel}, AC = \${formatNum(sides[2].length)} \${unitLabel}</div>
              <div><span class="label">Góc:</span> <span class="angle-A">∠A = \${formatAngle(angles[0].value)}</span>, <span class="angle-B">∠B = \${formatAngle(angles[1].value)}</span>, <span class="angle-C">∠C = \${formatAngle(angles[2].value)}</span> (Tổng = \${formatAngle(total)})</div>
            \`;
          }
          drawPrint();
        <\/script>
        </body></html>
      `);
      printWindow.document.close();
    };

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
    }

    canvas.addEventListener('mousedown', (e) => {
      const pos = getMousePos(e);
      const hit = points.find(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 16);
      if (hit) { dragging = hit; canvas.style.cursor = 'grabbing'; e.preventDefault(); }
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const pos = getMousePos(e);
      dragging.x = Math.max(20, Math.min(pos.x, canvas.width - 20));
      dragging.y = Math.max(20, Math.min(pos.y, canvas.height - 20));
      renderAll();
    });

    document.addEventListener('mouseup', () => { if (dragging) { dragging = null; canvas.style.cursor = 'grab'; } });
    canvas.addEventListener('mouseenter', () => { canvas.style.cursor = 'grab'; });

    document.getElementById('unitSelect').addEventListener('change', renderAll);
    document.getElementById('roundDecimals').addEventListener('change', renderAll);
    document.getElementById('decimalPlaces').addEventListener('change', renderAll);
    document.getElementById('roundAngles').addEventListener('change', renderAll);

    window.addEventListener('load', resetTriangle);
  })();
</script>
</body>
</html>
